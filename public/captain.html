<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f4d2a">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Captain — Score Entry</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="topbar">
  <h1>Captain</h1>
  <div>
    <a href="/">Leaderboard</a>
    <button id="logoutBtn" style="display:none">Logout</button>
  </div>
</div>
<div class="wrap">
  <div id="loginView" class="card">
    <h2>Enter your team code</h2>
    <p style="font-size:13px;color:var(--muted)">Get the 6-character code from the tournament admin.</p>
    <input id="codeInput" placeholder="e.g. K7P2QX" style="width:100%;text-transform:uppercase;letter-spacing:3px;font-size:18px;text-align:center" maxlength="8">
    <div style="margin-top:10px"><button class="primary" id="loginBtn" style="width:100%">Sign In</button></div>
    <div id="loginErr" class="error-msg"></div>
  </div>

  <div id="captainView" style="display:none">
    <div class="card">
      <h2 id="teamName"></h2>
      <div style="font-size:13px;color:var(--muted)" id="teamMeta"></div>
      <div style="margin-top:10px;display:flex;gap:8px;align-items:center">
        <label style="margin:0">Currently on hole:</label>
        <select id="currentHoleSel"></select>
      </div>
    </div>

    <div class="card">
      <h2>Hole-by-Hole Score</h2>
      <p style="font-size:12px;color:var(--muted);margin-top:-6px">Enter your team's gross score per hole. Saved automatically.</p>
      <div id="holesGrid" class="holes-grid"></div>
      <div id="totals" style="margin-top:14px;display:flex;justify-content:space-around;font-size:14px"></div>
    </div>

    <div class="card">
      <h2>Add a Note or Photo</h2>
      <div class="row">
        <div>
          <label>Hole (optional)</label>
          <select id="noteHole"><option value="">—</option></select>
        </div>
        <div>
          <label>Photo (optional)</label>
          <input type="file" id="notePhoto" accept="image/*">
        </div>
      </div>
      <div style="margin-top:8px">
        <label>Message</label>
        <textarea id="noteMsg" rows="2" style="width:100%" placeholder="e.g. Birdie putt from 30ft!"></textarea>
      </div>
      <div style="margin-top:10px"><button class="primary" id="postNoteBtn">Post to Live Feed</button></div>
      <div id="noteMsgOut" class="success-msg"></div>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
let team = null;
let pars = [];

async function checkSession() {
  try {
    const r = await fetch('/api/captain/me');
    if (r.ok) { const d = await r.json(); enterCaptain(d); }
  } catch(e) {}
}

document.getElementById('loginBtn').onclick = async () => {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  const err = document.getElementById('loginErr');
  err.textContent = '';
  if (!code) { err.textContent = 'Enter your code'; return; }
  const r = await fetch('/api/captain/login', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ code })
  });
  if (!r.ok) { const d = await r.json(); err.textContent = d.error || 'Login failed'; return; }
  enterCaptain(await r.json());
};

document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

document.getElementById('logoutBtn').onclick = async () => {
  await fetch('/api/captain/logout', { method: 'POST' });
  location.reload();
};

function enterCaptain(data) {
  team = data.team;
  pars = team.pars;
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('captainView').style.display = '';
  document.getElementById('logoutBtn').style.display = '';
  document.getElementById('teamName').textContent = team.name;
  document.getElementById('teamMeta').textContent = `Team handicap: ${team.handicap}`;

  const sel = document.getElementById('currentHoleSel');
  const noteHole = document.getElementById('noteHole');
  for (let i = 1; i <= 18; i++) {
    sel.innerHTML += `<option value="${i}" ${i === team.current_hole ? 'selected' : ''}>Hole ${i}</option>`;
    noteHole.innerHTML += `<option value="${i}">Hole ${i}</option>`;
  }
  sel.onchange = async () => {
    await fetch('/api/captain/hole', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ hole: parseInt(sel.value) })
    });
    team.current_hole = parseInt(sel.value);
    renderHoles();
  };

  const scoreMap = {};
  for (const s of data.scores) scoreMap[s.hole] = s.gross;
  renderHoles(scoreMap);
}

function renderHoles(scoreMap) {
  if (scoreMap) window._scoreMap = scoreMap;
  scoreMap = window._scoreMap || {};
  const grid = document.getElementById('holesGrid');
  let html = '';
  for (let i = 1; i <= 18; i++) {
    const cls = i === team.current_hole ? 'current' : '';
    html += `<div class="hole-cell ${cls}">
      <label>Hole ${i}</label>
      <div class="par-label">Par ${pars[i-1]}</div>
      <input type="number" min="1" max="20" data-hole="${i}" value="${scoreMap[i] ?? ''}">
    </div>`;
  }
  grid.innerHTML = html;
  grid.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('change', async () => {
      const hole = parseInt(inp.dataset.hole);
      const v = inp.value === '' ? null : parseInt(inp.value);
      await fetch('/api/captain/score', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ hole, gross: v })
      });
      window._scoreMap[hole] = v;
      updateTotals();
    });
  });
  updateTotals();
}

function updateTotals() {
  const sm = window._scoreMap || {};
  let g = 0, p = 0, n = 0;
  for (let i = 1; i <= 18; i++) {
    if (sm[i] != null) { g += sm[i]; p += pars[i-1]; n++; }
  }
  document.getElementById('totals').innerHTML = n === 0
    ? '<div style="color:var(--muted)">No scores entered yet</div>'
    : `<div><strong>${n}</strong> holes</div><div><strong>${g}</strong> gross</div><div><strong>${fmtPar(g - p)}</strong> to par</div>`;
}

document.getElementById('postNoteBtn').onclick = async () => {
  const hole = document.getElementById('noteHole').value;
  const message = document.getElementById('noteMsg').value.trim();
  const file = document.getElementById('notePhoto').files[0];
  const out = document.getElementById('noteMsgOut');
  if (!message && !file) { out.textContent = 'Add a message or photo'; out.className = 'error-msg'; return; }

  let photo = null;
  if (file) {
    if (file.size > 5 * 1024 * 1024) { out.textContent = 'Photo too large (max 5MB)'; out.className='error-msg'; return; }
    photo = await resizeImage(file, 1200);
  }
  const r = await fetch('/api/captain/note', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ hole: hole || null, message, photo })
  });
  if (r.ok) {
    out.textContent = 'Posted!'; out.className = 'success-msg';
    document.getElementById('noteMsg').value = '';
    document.getElementById('notePhoto').value = '';
    setTimeout(() => out.textContent = '', 2000);
  } else {
    out.textContent = 'Failed to post'; out.className = 'error-msg';
  }
};

function resizeImage(file, maxDim) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const w = img.width * scale, h = img.height * scale;
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', 0.82));
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

checkSession();
</script>
</body>
</html>
