services:
  - type: web
    name: golf-tournament
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: golf-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: golf-db
    plan: free
    databaseName: golf
    user: golf
